<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG to JPG Converter</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #18181b;
      color: white;
    }
    canvas {
      display: none;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    img {
      max-width: 300px;
      margin: 1rem;
    }
    button {
      background: linear-gradient(135deg, #34d399, #06b6d4);
      border: none;
      padding: 12px 24px;
      color: white;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      margin: 0.5rem;
    }
    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SVG to JPG Converter</h1>
    <img id="svgImage" src="public/cipher-favicon.svg" alt="Cipher Logo" crossorigin="anonymous" />
    <br>
    <button onclick="convertToJpg()">Download as JPG</button>
    <button onclick="convertToPng()">Download as PNG</button>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const svgData = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="cStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)"/>
  <path d="M44 19a18 18 0 1 0 0 26" fill="none" stroke="url(#cStroke)" stroke-width="7" stroke-linecap="round"/>
  <path d="M40 38.5l7.5 5.2v-9.4z" fill="#22d3ee"/>
  <circle cx="42.5" cy="25.5" r="1.7" fill="#a7f3d0"/>
  <circle cx="47" cy="25.5" r="1.7" fill="#a7f3d0"/>
</svg>`;

    function convertToJpg() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const img = new Image();
      
      const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(svgBlob);
      
      img.onload = function() {
        canvas.width = 1200;
        canvas.height = 630;
        ctx.fillStyle = '#18181b';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const scale = Math.min(canvas.width / 64, canvas.height / 64) * 0.8;
        const x = (canvas.width - 64 * scale) / 2;
        const y = (canvas.height - 64 * scale) / 2;
        
        ctx.drawImage(img, x, y, 64 * scale, 64 * scale);
        
        const link = document.createElement('a');
        link.download = 'cipher-favicon.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.9);
        link.click();
        
        URL.revokeObjectURL(url);
      };
      
      img.src = url;
    }

    function convertToPng() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const img = new Image();
      
      const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(svgBlob);
      
      img.onload = function() {
        canvas.width = 1200;
        canvas.height = 630;
        ctx.fillStyle = '#18181b';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const scale = Math.min(canvas.width / 64, canvas.height / 64) * 0.8;
        const x = (canvas.width - 64 * scale) / 2;
        const y = (canvas.height - 64 * scale) / 2;
        
        ctx.drawImage(img, x, y, 64 * scale, 64 * scale);
        
        const link = document.createElement('a');
        link.download = 'cipher-favicon.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        URL.revokeObjectURL(url);
      };
      
      img.src = url;
    }
  </script>
</body>
</html>
